services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Local_Dev_Passw0rd!"
    ports:
      - "1433:1433"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      Database__Provider: SqlServer
      ConnectionStrings__SqlServerCnn: "Server=db,1433;Database=CompeTournamentDb;User Id=sa;Password=Local_Dev_Passw0rd!;TrustServerCertificate=True;MultipleActiveResultSets=true"
      Tokens__Key: "local-dev-only-signing-key-change-me-0123456789-0123456789"
      Tokens__Issuer: CompeTournament
      Tokens__Audience: CompeTournamentUsers
    ports:
      - "8080:8080"

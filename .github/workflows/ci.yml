name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore CompeTournament.Tests/CompeTournament.Tests.csproj

      - name: Build
        run: dotnet build CompeTournament.Tests/CompeTournament.Tests.csproj -c Release --no-restore

      - name: Test
        run: dotnet test CompeTournament.Tests/CompeTournament.Tests.csproj -c Release --no-build --logger "console;verbosity=normal"
